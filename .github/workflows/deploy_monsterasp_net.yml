
name: Deploy ddpc.DartSuite.Web to MonsterASP.NET

on:
  workflow_dispatch:
  push:
    branches:
      - publish-web

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj

      - name: Install MSDeploy
        run: choco install webdeploy --no-progress -y

      - name: Build
        run: dotnet build ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj --configuration Release --no-restore



      - name: Prepare Publish Profile
        run: |
          mkdir -p ./src/ddpc.DartSuite.Web/Properties/PublishProfiles
          printf "%s" "${{ secrets.MONSTERASP_NET_DEPLOY }}" > ./src/ddpc.DartSuite.Web/Properties/PublishProfiles/MonsterAspNet.pubxml

      - name: Upload Publish Profile (pre-deploy)
        uses: actions/upload-artifact@v4
        with:
          name: publish-profile-predeploy
          path: src/ddpc.DartSuite.Web/Properties/PublishProfiles/MonsterAspNet.pubxml

      - name: Publish
        run: |
          dotnet publish ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj `
            --configuration Release `
            --output ./publish_output `
            /p:PublishProfile=MonsterAspNet `
            /bl:publish.binlog
        env:
          DOTNET_CLI_HOME: ${{ runner.temp }}

      - name: Upload Publish Log
        uses: actions/upload-artifact@v4
        with:
          name: publish-log
          path: publish.binlog

      - name: Upload Published Output
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: publish_output/


      - name: Upload Publish Profile
        uses: actions/upload-artifact@v4
        with:
          name: publish-profile
          path: src/ddpc.DartSuite.Web/Properties/PublishProfiles/MonsterAspNet.pubxml

      - name: Clean up publish profile
        run: Remove-Item ./src/ddpc.DartSuite.Web/Properties/PublishProfiles/MonsterAspNet.pubxml
