
name: Deploy ddpc.DartSuite.Web to MonsterASP.NET

on:
  workflow_dispatch:
  push:
    branches:
      - publish-web

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj

      - name: Install MSDeploy
        run: choco install webdeploy --no-progress -y

      - name: Build
        run: dotnet build ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj --configuration Release --no-restore

      - name: Publish and Deploy to MonsterASP.NET
        env:
          DOTNET_CLI_HOME: ${{ runner.temp }}
          MONSTERASP_NET_URL: ${{ secrets.MONSTERASP_NET_URL }}
          MONSTERASP_NET_SITE: ${{ secrets.MONSTERASP_NET_SITE }}
          MONSTERASP_NET_USER: ${{ secrets.MONSTERASP_NET_USER }}
          MONSTERASP_NET_PWD: ${{ secrets.MONSTERASP_NET_PWD }}
        run: |
          dotnet publish ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj `
            --configuration Release `
            --output ./publish_output `
            /p:AuthType=Basic `
            /p:IncludeAcls=False `
            /p:AllowUntrustedCertificate=True `
            /p:PublishMethod=MSDeploy `
            /p:MSDeployPublishMethod=RemoteAgent `
            /p:MSDeployServiceUrl="$env:MONSTERASP_NET_URL" `
            /p:DeployIisAppPath="$env:MONSTERASP_NET_SITE" `
            /p:UserName="$env:MONSTERASP_NET_USER" `
            /p:Password="$env:MONSTERASP_NET_PWD" `
            /v:diag `
            /p:EnableMsDeployTrace=True `
            /fl `
            /flp:logfile=msdeploy-detailed.log;verbosity=diagnostic

      - name: Upload MSDeploy Log
        uses: actions/upload-artifact@v4
        with:
          name: msdeploy-log
          path: msdeploy-detailed.log

      - name: Upload Published Output
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: publish_output/

