
name: Deploy ddpc.DartSuite.Web to MonsterASP.NET

on:
  workflow_dispatch:
  push:
    branches:
      - publish-web

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj

      - name: Install MSDeploy
        run: choco install webdeploy --no-progress -y

      - name: Build
        run: dotnet build ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj --configuration Release --no-restore

      - name: Publish (nur Build)
        run: |
          dotnet publish ./src/ddpc.DartSuite.Web/ddpc.DartSuite.Web.csproj --configuration Release --output ./publish_output

      - name: Deploy mit msdeploy.exe (Klartext)
        env:
          SOURCE_PATH: publish_output
          DEST_SITE: site65398
          DEST_URL: https:/site65398.siteasp.net:8172/msdeploy.axd?site=site65398
          USERNAME: site65398
          PASSWORD: Xe6+9A!b-3kR
        shell: cmd
        run: |
          "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
            -verb:sync ^
            -source:contentPath="%SOURCE_PATH%" ^
            -dest:contentPath="%DEST_SITE%",computerName="%DEST_URL%",userName="%USERNAME%",password="%PASSWORD%",authtype="Basic",includeAcls="False" ^
            -allowUntrusted ^
            -disableLink:AppPoolExtension ^
            -disableLink:ContentExtension ^
            -disableLink:CertificateExtension ^
            -verbose

      - name: Upload Published Output
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: publish_output/

